<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Privacy Edge Jarvis</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <main class="app">
      <header class="topbar">
        <div>
          <p class="eyebrow">EDGE AGENTIC RAG</p>
          <h1>Privacy Edge Jarvis</h1>
        </div>
        <button id="metrics-btn" class="ghost">Refresh Metrics</button>
      </header>

      <section class="panels">
        <section class="chat-panel card">
          <div id="chat-log" class="chat-log"></div>
          <form id="chat-form" class="chat-form">
            <input id="chat-input" placeholder="Ask anything. Try: latest AI safety news" required />
            <button type="submit">Send</button>
          </form>
        </section>

        <aside class="side">
          <section class="card side-card">
            <h2>Tool Timeline</h2>
            <div id="tool-trace" class="stack"></div>
          </section>

          <section class="card side-card">
            <h2>Citations</h2>
            <div id="citations" class="stack"></div>
          </section>

          <section class="card side-card">
            <h2>Runtime Metrics</h2>
            <div id="metrics" class="stack"></div>
          </section>
        </aside>
      </section>
    </main>

    <template id="msg-template">
      <article class="msg">
        <p class="role"></p>
        <p class="content"></p>
      </article>
    </template>

    <script src="/assets/app.js"></script>
  </body>
</html>
