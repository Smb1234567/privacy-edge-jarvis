<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Privacy Edge Jarvis</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <p class="eyebrow">EDGE AGENTIC RAG</p>
          <h1>Privacy Edge Jarvis</h1>
        </div>

        <button id="metrics-btn" class="btn secondary">Refresh Status</button>

        <form id="upload-form" class="upload-box">
          <label for="file-input">Knowledge Upload</label>
          <input id="file-input" type="file" multiple />
          <button type="submit" class="btn">Upload & Reindex</button>
        </form>

        <section class="panel">
          <h2>LLM + Index Status</h2>
          <div id="system-status" class="stack"></div>
        </section>

        <section class="panel">
          <h2>Runtime Metrics</h2>
          <div id="metrics" class="stack"></div>
        </section>
      </aside>

      <main class="chat-main">
        <section id="chat-log" class="chat-log"></section>

        <section class="inspector">
          <article class="panel">
            <h2>Tool Timeline</h2>
            <div id="tool-trace" class="stack"></div>
          </article>
          <article class="panel">
            <h2>Citations</h2>
            <div id="citations" class="stack"></div>
          </article>
        </section>

        <form id="chat-form" class="composer">
          <input id="chat-input" placeholder="Ask with context or tools: latest LLM eval news" required />
          <button type="submit" class="btn">Send</button>
        </form>
      </main>
    </div>

    <template id="msg-template">
      <article class="msg">
        <p class="role"></p>
        <p class="content"></p>
      </article>
    </template>

    <script src="/assets/app.js"></script>
  </body>
</html>
